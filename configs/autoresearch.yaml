# Autoresearch-optimized configuration
# Found via 28 autonomous experiments on Apple Silicon (5-min budget)
# val_bpb: 1.6755 | 15.4M params | ~891 steps in 5 min
#
# Key design choices:
#   - 2 layers (shallow = fast = more optimizer steps)
#   - Mamba first, Attention last (reversed order is catastrophic)
#   - GQA with n_kv_heads=2 (Mamba provides context, Attention needs fewer KV)
#   - Squared ReLU FFN (simpler than SwiGLU, comparable quality)

vocab_size: 8192
d_model: 512
n_layers: 2
attn_layer_indices: [1]
n_heads: 8
n_kv_heads: 2
d_state: 16
d_conv: 4
expand: 2
headdim: 64
chunk_size: 128
ffn_mult: 4.0
